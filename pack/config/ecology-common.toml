#High-level Ecology behavior preset. CUSTOM uses the individual switches below.
#VANILLA_SAFE keeps Ecology passive. LIGHT_ECOLOGY enables colony data and beekeeper relocation without replacing vanilla bee AI.
#FULL_SIMULATION enables the complete bee simulation and village construction. DEBUG_TESTING is full simulation plus noisy diagnostics and auto-seeded hives.
#Allowed Values: CUSTOM, VANILLA_SAFE, LIGHT_ECOLOGY, FULL_SIMULATION, DEBUG_TESTING
gameplayPreset = "FULL_SIMULATION"
#Master switch for Ecology's advanced bee AI, colony simulation, hive data, and bee relocation items. Disabled by default so vanilla bee behavior is unchanged unless a pack opts in.
enableBeeSystem = true
#When false, Ecology only initializes bee memory and leaves vanilla bee AI intact.
replaceVanillaBeeGoals = true
#Enables Ecology colony simulation from vanilla hive ticks.
enableHiveColonyTicking = true
#When true, visible bees die from Ecology lifespan rules in entity tick.
enableBeeLifespanDeath = true
#Enables live drone mating AI.
enableDroneMatingGoal = true
#Enables live queen migration AI.
enableQueenMigrationGoal = true
#Enables the beekeeper knife, brood comb, captured worker bee, nest sealing, and hive day simulator interactions. Requires enableBeeSystem and enableHiveColonyTicking.
enableBeeRelocationItems = true
#Enables colony health scoring for Jade, beekeeper journals, and systems that react to hive condition.
enableHiveHealth = true
#Lets healthy colonies occasionally grow a crop by an extra stage when a worker delivers pollen.
enableHealthyPollinationBonus = true
#Maximum extra crop-growth chance from a healthy or thriving colony.
# Default: 0.35
# Range: 0.0 ~ 1.0
healthyPollinationBonusChance = 0.35
#Enables colony traits that influence health, route productivity, brood success, temperament, and swarming.
enableColonyTraits = true
#Lets healthy crowded colonies create daughter colonies in nearby empty hives.
enableSwarming = true
#Daily chance for a swarm-ready colony to create a daughter colony when an empty hive is nearby.
# Default: 0.18
# Range: 0.0 ~ 1.0
swarmingChance = 0.18
#Minimum Minecraft days between successful swarms from the same colony.
# Default: 3
# Range: 1 ~ 30
swarmCooldownDays = 3
#Logs diagnostic Ecology bee initialization and hive tick events.
debugBeeSystemLogging = false
#When true, villager iron golem spawning builds the iron golem structure before the golem appears.
enableVillagerGolemConstruction = true
#Logs diagnostic village iron golem construction events.
debugVillagerGolemConstruction = false
#Enables village ecology scoring, Village Ledger reports, and village-health effects on golem construction.
enableVillageEcology = true
#Lets villagers occasionally perform small upkeep tasks such as replanting empty farmland, repairing path gaps, and adding garden flowers.
enableVillageMaintenance = true
#Horizontal radius used by village ecology surveys.
# Default: 32
# Range: 8 ~ 96
villageEcologyRadius = 32
#Per-villager tick interval for attempting small village maintenance.
# Default: 1200
# Range: 200 ~ 12000
villageMaintenanceIntervalTicks = 1200
#Chance that a villager performs a maintenance action when its interval triggers.
# Default: 0.2
# Range: 0.0 ~ 1.0
villageMaintenanceChance = 0.2
#Lets Ecology assign professions to jobless adult villagers based on parent professions, village needs, and a small random chance.
enableVillageVocations = true
#Enables a lightweight village supply ledger that affects villager trade capacity and can catch up while villages are unloaded.
enableVillageSupplies = true
#Minimum game ticks between per-village supply catch-up attempts from active villagers.
# Default: 600
# Range: 100 ~ 12000
villageSupplyUpdateIntervalTicks = 600
#Minimum game ticks between full village supply surveys. Higher values reduce scans; lower values react faster to building changes.
# Default: 2400
# Range: 300 ~ 24000
villageSupplySurveyIntervalTicks = 2400
#Maximum Minecraft days of village supply progress to simulate after a village has been unloaded.
# Default: 3
# Range: 1 ~ 14
villageSupplyCatchupDays = 3
#Tracks whether trading villagers can reach homes and meeting space. Confined villagers lose Ecology market benefits and gain price penalties.
enableVillageWelfare = true
#Per-villager interval for checking whether a villager appears confined.
# Default: 1800
# Range: 600 ~ 12000
villageWelfareCheckIntervalTicks = 1800
#Consecutive failed welfare checks before Ecology treats a villager as confined.
# Default: 3
# Range: 1 ~ 10
villageWelfareGraceChecks = 3
#Maximum special price increase applied to confined villagers' offers.
# Default: 16
# Range: 0 ~ 64
villageWelfareMaxPricePenalty = 16
#Tracks villager households, parentage, home ownership, household savings, and adult children moving into empty homes.
enableVillageHouseholds = true
#Per-villager interval for light household syncing and adult-child move-out checks.
# Default: 1200
# Range: 300 ~ 12000
villageHouseholdUpdateIntervalTicks = 1200
#Household savings spent when an adult child moves into an empty home.
# Default: 32
# Range: 0 ~ 500
villageHouseholdMoveOutSavings = 32
#Savings level at which a crowded household is reported as ready to fund a home expansion.
# Default: 72
# Range: 0 ~ 1000
villageHouseholdExpansionReadySavings = 72
#Lets households with enough savings fund houses on player-approved plots marked with the Village Ledger and a banner.
enableVillageHouseConstruction = true
#Household savings spent when starting a player-approved house construction.
# Default: 72
# Range: 0 ~ 1000
villageHouseConstructionSavingsCost = 72
#Household savings spent when adding beds to an existing generated village home.
# Default: 24
# Range: 0 ~ 500
villageHomeUpgradeSavingsCost = 24
#Maximum beds Ecology may add during one existing-home upgrade.
# Default: 2
# Range: 1 ~ 8
villageHomeUpgradeMaxBeds = 2
#Legacy pacing value kept for existing configs. Vanilla template homes are placed as complete structures.
# Default: 8
# Range: 1 ~ 64
villageHouseConstructionBlocksPerStep = 8
#Maximum width or depth of a player-approved house construction plot.
# Default: 15
# Range: 7 ~ 32
villageHousePlotMaxSize = 15
#Base weight for small vanilla village house templates.
# Default: 42
# Range: 0 ~ 1000
villageHouseSmallWeight = 42
#Base weight for medium vanilla village house templates.
# Default: 36
# Range: 0 ~ 1000
villageHouseMediumWeight = 36
#Base weight for larger vanilla village house templates.
# Default: 22
# Range: 0 ~ 1000
villageHouseLargeWeight = 22
#Lets players assign villager market stall positions with the Village Ledger. Assigned villagers walk to their stall during work hours when pathing allows.
enableVillageMarketStalls = true
#Per-villager interval for nudging assigned villagers toward their market stall during work hours.
# Default: 160
# Range: 40 ~ 1200
villageMarketStallWalkIntervalTicks = 160
#Lets players assign tradeboards and stock inventories to non-confined villagers for player-supplied custom trades.
enableVillagePlayerTrades = true
#Maximum active tradeboard offers generated for one villager. A 15x15 tradeboard can hold more definitions, but only this many stocked offers are exposed at once.
# Default: 64
# Range: 1 ~ 225
villagePlayerTradeMaxOffers = 64
#Assigns each village one trade currency. Ruby and sapphire villages only spawn when another mod/datapack supplies items through Ecology's village currency tags.
enableVillageCurrencies = true
#Worker bee lifespan in Minecraft days.
# Default: 7
# Range: 1 ~ 365
workerLifespanDays = 7
#Drone bee lifespan in Minecraft days.
# Default: 14
# Range: 1 ~ 365
droneLifespanDays = 14
#Queen bee lifespan in Minecraft days.
# Default: 21
# Range: 1 ~ 365
queenLifespanDays = 21
#Minecraft days a queen must age before her hive can trigger a mating flight.
# Default: 2
# Range: 0 ~ 365
queenMatingMaturityDays = 2
#Maximum founder-lineage overlap allowed for mating. 1.0 permits exact-family matings; lower values reject closer related colonies.
# Default: 0.75
# Range: 0.0 ~ 1.0
maxMatingLineageOverlap = 0.75
#Brood failure multiplier from inbreeding. A value of 1.0 means F=0.5 gives a 50% brood success penalty.
# Default: 1.0
# Range: 0.0 ~ 1.0
inbreedingBroodPenalty = 1.0
# Default: 5
# Range: 1 ~ 32
maxWorkersPerHive = 5
# Default: 3
# Range: 0 ~ 32
maxDronesPerHive = 3
#Ecology currently tracks one queen per hive.
# Default: 1
# Range: 1 ~ 1
maxQueensPerHive = 1
#Maximum bees an Ecology hive or nest can physically store.
# Default: 5
# Range: 1 ~ 32
beehiveCapacity = 5
#Minimum ticks before newly stored nectarless bees can leave a hive. Vanilla uses 600 ticks.
# Default: 100
# Range: 1 ~ 24000
freshHiveReleaseTicks = 100
#Extra ticks after the next Minecraft day starts before a worker that completed its route may leave the hive.
# Default: 100
# Range: 0 ~ 24000
dailyCompleteReleasePaddingTicks = 100
#Development helper only. When false, empty hives never generate free Ecology colonies.
autoSeedEmptyHives = false
#Maximum flower/crop pairs a worker bee attempts each day.
# Default: 8
# Range: 1 ~ 32
maxRoutePairs = 8
#Workers raise a replacement queen when the current queen has this many Minecraft days left.
# Default: 3
# Range: 1 ~ 21
queenReplacementDays = 3
#Maximum colony days to simulate when a hive chunk loads after being unloaded.
# Default: 3
# Range: 1 ~ 30
colonyCatchupDays = 3
#Horizontal radius for live bee searches. A value of 2 means a 5x5 area.
# Default: 2
# Range: 1 ~ 8
beeLocalSearchHorizontalRadius = 2
#Vertical radius for live bee searches. This is taller than the horizontal range so tree-nest bees can see ground flowers.
# Default: 5
# Range: 0 ~ 8
beeLocalSearchVerticalRadius = 5
#Local search areas a worker can fail to find the next route target in before returning home.
# Default: 8
# Range: 1 ~ 64
maxRouteSearchMisses = 8
#Ticks a worker searches for its next flower before returning home.
# Default: 1200
# Range: 20 ~ 6000
workerFlowerSearchTicks = 1200
#Ticks a worker searches for a crop after gathering pollen before returning home.
# Default: 600
# Range: 20 ~ 6000
workerCropSearchTicks = 600
#Ticks a worker may spend travelling to a flower or crop target before returning home.
# Default: 600
# Range: 20 ~ 6000
workerTravelTargetTicks = 600
#Maximum block distance a worker may roam from its home hive before returning.
# Default: 50
# Range: 4 ~ 256
workerMaxDistanceFromHive = 50
#Worker flower detection range. Vanilla bee pollination searches within five blocks.
# Default: 5
# Range: 1 ~ 32
flowerSearchRange = 5
#Crop search range used after each flower.
# Default: 5
# Range: 1 ~ 32
cropSearchRange = 5
# Default: 20
# Range: 1 ~ 128
hiveSearchRange = 20
# Default: 48
# Range: 8 ~ 256
migrationSearchRange = 48
#Horizontal player distance from a worker route that makes that bee defensive.
# Default: 3.0
# Range: 0.5 ~ 16.0
pathHorizontalTriggerRange = 3.0
#Vertical player distance from a worker route that makes that bee defensive.
# Default: 2.0
# Range: 0.5 ~ 16.0
pathVerticalTriggerRange = 2.0
#Ticks a player must remain in a worker route before that bee becomes aggressive.
# Default: 60
# Range: 1 ~ 600
routeAgitationAttackTicks = 60
