#When true, sneak-right-clicking a workstation can open the old template selector GUI for debugging.
debugTemplateSelector = false
#When true, vanilla sword, shovel, pickaxe, axe, and hoe recipes remain enabled. When false, vanilla material tool recipes are removed so Mobs Tool Forging owns tool progression.
enableVanillaToolRecipes = false
#When true, starter flint tool progression is enabled: Plant Fiber drops, placed flint knapping, and ground assembly.
enableCrudeFlintTools = true
#When true, vanilla stone tool recipes are removed at server start.
disableStoneTools = true
#When true, vanilla wooden tool recipes are removed at server start. Default stays false for standalone play.
disableWoodenTools = false
#When true, vanilla copper ore, copper blocks, and raw copper blocks can be harvested with wooden-tier pickaxes. Flint uses wooden-tier mining rules.
copperRequiresWoodenTool = true
#When true, finished Mobs Tool Forging modular tools and weapons cannot be enchanted directly. Enchant tool parts before assembly instead.
requireToolPartEnchanting = true
#When true, finished Mobs Tool Forging modular armor cannot be enchanted directly. Enchant armor parts before assembly instead.
requireArmorPartEnchanting = true
#When true, vanilla tools and weapons generated by loot tables are replaced with Mobs Tool Forging modular equivalents.
convertVanillaLootToModularTools = true

[progression]
	#When true, the cheap Crude Anvil is available as an early, lower-quality shaping station.
	enableCrudeAnvil = true
	#When true, the physical Pattern Rack block can store visible patterns for nearby stations.
	enablePatternRack = true
	#When false, Pattern Boards can be used for basic Pattern Creation Station output before paper is available.
	basicPatternsRequirePaper = false
	#Horizontal block range for assigning rack patterns to nearby stations. The rack must also be within one block vertically.
	# Default: 4
	# Range: 1 ~ 16
	workshopPatternRange = 4
	#When true, directly using pattern items on stations remains enabled as a fallback.
	allowDirectPatternStationSelection = true

[heating]
	#When true, the Heating Forge can heat solid metal workpieces.
	enableForgeHeating = true
	#When true, metal materials must be heated before they can be placed on an anvil station.
	requireHeatedMetal = true
	#Default minimum metal temperature required for forging. 0.9 means 90%. Datapack forge templates can override this per template.
	# Default: 0.9
	# Range: 0.0 ~ 1.0
	minimumForgeTemperature = 0.9
	#Minimum remaining temperature for low-heat metals such as copper, gold, and early iron. This is lower than the LOW heat target so campfire-heated ingots have a cooling margin.
	# Default: 0.4
	# Range: 0.0 ~ 1.0
	lowHeatMinimumForgeTemperature = 0.4
	#Ticks required for the Heating Forge to heat a metal workpiece.
	# Default: 1200
	# Range: 1 ~ 72000
	heatedWorkpieceTicks = 1200
	#Ticks a heated workpiece remains workable after leaving the Heating Forge.
	# Default: 2400
	# Range: 1 ~ 72000
	coolingTicks = 2400
	#When true, campfire-warmed workpieces can start low-heat forging. Nearby lit campfires count as low workshop heat only for already-warmed workpieces; cold ingots still need to be warmed first.
	enableCampfireLowHeat = true
	#Heat level supplied by nearby lit campfires. Valid values: NONE, LOW, HOT, HIGH.
	campfireHeatLevel = "LOW"
	#When true, metal heat is checked when a shaping job starts rather than interrupting hammering mid-craft.
	requireHeatAtJobStartOnly = true
	#When false, an active anvil workpiece stays workable until it completes or is cleared.
	workpieceCoolsMidCraft = false
	#Ticks a Heating Forge keeps nearby workshop heat after burning fuel.
	# Default: 2400
	# Range: 1 ~ 72000
	forgeHeatBufferTicks = 2400

[quality]
	#When true, shaped parts and finished tools store workmanship quality.
	enableQuality = true
	#When true, well-timed in-world work actions can improve workmanship quality.
	enableTimingQuality = true
	#When true, finished tool quality modestly adjusts durability and stats.
	qualityAffectsStats = true
	#Half-window in ticks for a well-timed hammer/cutting action.
	# Default: 8
	# Range: 1 ~ 40
	timingQualityWindowTicks = 8
	#Maximum quality from the Crude Anvil.
	crudeAnvilMaxQuality = "WORKED"
	#Maximum quality from the Smithing Anvil.
	smithingAnvilMaxQuality = "FINE"
	#Maximum quality from the Lapidary Table.
	lapidaryTableMaxQuality = "FINE"

[lapidary]
	#When true, the Gem Cutter's Knife is required for every Lapidary Table work action. When false, it is optional quality help.
	gemcuttersFileRequired = false
	#When true, diamond parts require abrasive on the Lapidary Table.
	diamondRequiresAbrasive = true
	#Item id used as the diamond abrasive. The default intentionally standardises on diamond_powder.
	diamondAbrasiveItem = "mobstoolforging:diamond_powder"

[bloomery]
	#Reserved for future raw ore to bloom/crude ingot processing.
	enableBloomery = false
	#Reserved for future bloomery progression. This pass does not replace vanilla ore smelting.
	replaceVanillaOreSmelting = false

[casting]
	#Reserved for future molten metal handling. This pass does not implement crucibles.
	enableCrucible = false
	#Reserved for future casting systems. This pass does not implement casting.
	enableCasting = false
	#Reserved for future ingot casting.
	enableIngotCasting = false
	#Reserved for future block casting.
	enableBlockCasting = false
	#Reserved for future rough cast tool heads that still need finishing.
	enableToolHeadCasting = false
