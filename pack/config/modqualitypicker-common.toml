#The quality profile selected for the current launch. Profile application happens before Minecraft finishes loading mods.
activeProfileId = "balanced"
#Allows players to make local enabled/disabled mod choices in addition to pack developer presets.
allowPlayerModOverrides = true
#Writes the currently loaded mod snapshot to config/modqualitypicker/active-selection.json after startup.
writeLaunchSnapshot = true
#Checks a world's saved quality profile before the world is opened.
enableWorldLoadPrompt = true
#Exits Minecraft after queuing a world's profile so the launcher can restart with the requested mod set.
exitAfterQueuingWorldProfile = false
#Preset export destination relative to the game directory. For this Prism workspace, ../pack/config/modqualitypicker points at the pack root.
packExportRoot = "../pack/config/modqualitypicker"
#How the world-open flow should react when the world profile does not match the current launch.
#Allowed Values: PROMPT, ALLOW_CURRENT, REQUIRE_WORLD_PROFILE
worldMismatchPolicy = "PROMPT"
